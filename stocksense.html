<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StockSense India | Auditor Terminal</title>
    <style>
        :root { --primary: #1a365d; --accent: #2b6cb0; --bg: #f7fafc; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: auto; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid var(--primary); padding-bottom: 10px; margin-bottom: 20px; }
        .search-area { display: flex; gap: 10px; }
        input { padding: 12px; width: 300px; border: 1px solid #cbd5e0; border-radius: 4px; }
        button { padding: 12px 24px; background: var(--primary); color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .card { background: white; padding: 25px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th { background: #edf2f7; text-align: left; padding: 12px; border-bottom: 2px solid #cbd5e0; }
        td { padding: 12px; border-bottom: 1px solid #edf2f7; font-size: 14px; line-height: 1.5; }
        .highlight-green { background: #f0fff4; color: #2f855a; font-weight: bold; }
        .price-large { font-size: 2em; font-weight: bold; margin: 10px 0; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>StockSense <span style="color: var(--accent);">India</span></h1>
        <div class="search-area">
            <input type="text" id="userInput" placeholder="Search Company (e.g. Infosys)">
            <button onclick="runAudit()">Audit Stock</button>
        </div>
    </div>

    <div id="status" style="display:none; padding: 10px; color: var(--accent);">🔍 Verifying Ledger...</div>

    <div id="dashboard" style="display:none;">
        <div class="card">
            <h2 id="compName">Company Name</h2>
            <div id="priceDisplay" class="price-large">₹0.00</div>
            <div id="metaDisplay">52W High: -- | 52W Low: --</div>
        </div>

        <div class="card">
            <h3>Corporate Ledger (Dividends & Board Meetings)</h3>
            <div id="corporateTable"></div>
        </div>
    </div>
</div>

<script>
    async function runAudit() {
        const query = document.getElementById('userInput').value;
        const status = document.getElementById('status');
        const dash = document.getElementById('dashboard');
        
        if(!query) return;
        status.style.display = 'block';
        dash.style.display = 'none';

        try {
            // 1. Search for Symbol
            const sRes = await fetch(`/api/market?action=search&q=${query}`);
            const sData = await sRes.json();
            const symbol = sData[0]?.symbol || query; 

            // 2. Get Price Details
            const pRes = await fetch(`/api/market?action=details&symbol=${symbol}`);
            const pData = await pRes.json();
            
            // 3. Get Corporate Actions (Meetings)
            const cRes = await fetch(`/api/market?action=corporate&symbol=${symbol}`);
            const cData = await cRes.json();

            updateUI(pData, cData, symbol);
        } catch (e) {
            alert("Audit Failed: " + e.message);
        } finally {
            status.style.display = 'none';
        }
    }

    function updateUI(price, corp, symbol) {
        document.getElementById('dashboard').style.display = 'block';
        document.getElementById('compName').innerText = symbol.toUpperCase();
        document.getElementById('priceDisplay').innerText = `₹${price.lastPrice || 'N/A'}`;
        document.getElementById('metaDisplay').innerText = `52W High: ₹${price.dayHigh || '--'} | 52W Low: ₹${price.dayLow || '--'}`;

        let table = `<table><tr><th>Date</th><th>Agenda</th></tr>`;
        
        if(corp.board_meetings && corp.board_meetings.data) {
            corp.board_meetings.data.forEach(row => {
                const isDiv = row[1].toLowerCase().includes("dividend");
                table += `<tr class="${isDiv ? 'highlight-green' : ''}">
                            <td style="white-space:nowrap"><strong>${row[0]}</strong></td>
                            <td>${row[1]}</td>
                          </tr>`;
            });
        } else {
            table += `<tr><td colspan="2">No records found in the official ledger.</td></tr>`;
        }
        table += `</table>`;
        document.getElementById('corporateTable').innerHTML = table;
    }
</script>
</body>
</html>
