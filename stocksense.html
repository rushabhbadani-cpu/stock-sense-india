<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StockSense India | Financial Terminal</title>
    <style>
        :root {
            --primary: #1a365d;
            --accent: #2b6cb0;
            --success: #2f855a;
            --bg: #f7fafc;
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: auto; }
        
        /* Header & Search */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 3px solid var(--primary); padding-bottom: 10px; }
        .search-box { display: flex; gap: 10px; }
        input { padding: 10px; width: 300px; border: 1px solid #cbd5e0; border-radius: 4px; }
        button { padding: 10px 20px; background: var(--primary); color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: var(--accent); }

        /* Dashboard Grid */
        .grid { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        
        /* Tables */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { text-align: left; background: #edf2f7; padding: 12px; border-bottom: 2px solid #cbd5e0; }
        td { padding: 12px; border-bottom: 1px solid #edf2f7; vertical-align: top; font-size: 14px; }
        .highlight { background: #f0fff4; font-weight: bold; color: var(--success); }
        
        .loading { display: none; color: var(--accent); font-weight: bold; }
        .error { color: #c53030; padding: 10px; background: #fff5f5; border-radius: 4px; display: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>StockSense <span style="color: var(--accent);">India</span></h1>
        <div class="search-box">
            <input type="text" id="tickerInput" placeholder="Enter Company Name (e.g. Reliance)">
            <button onclick="searchStock()">Audit Stock</button>
        </div>
    </div>

    <div id="loading" class="loading">Fetching Financial Data...</div>
    <div id="error" class="error"></div>

    <div class="grid">
        <div class="main-content">
            <div class="card" id="priceCard" style="display:none;">
                <h2 id="companyName">Company Overview</h2>
                <div id="priceDetails"></div>
            </div>

            <div class="card">
                <h2>Corporate Ledger (Meetings & Dividends)</h2>
                <div id="corporateActions">
                    <p style="color: #a0aec0;">Search for a stock to view board meetings and dividend history.</p>
                </div>
            </div>
        </div>

        <div class="sidebar">
            <div class="card">
                <h2>Quick Financials</h2>
                <div id="financialStats">
                    <p style="color: #a0aec0;">P&L and Balance Sheet summaries will appear here.</p>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const apiBase = '/api/market';

    async function searchStock() {
        const query = document.getElementById('tickerInput').value;
        const loader = document.getElementById('loading');
        const errDiv = document.getElementById('error');
        
        if (!query) return;

        loader.style.display = 'block';
        errDiv.style.display = 'none';

        try {
            // Step 1: Search for the correct symbol
            const searchRes = await fetch(`${apiBase}?action=search&q=${query}`);
            const searchData = await searchRes.json();
            
            // IndianAPI returns a symbol in its search results
            const symbol = searchData.symbol || searchData[0]?.symbol || query.toUpperCase();

            // Step 2: Fetch Corporate Actions (Using the structure you provided)
            await fetchCorporateData(symbol);
            
            // Step 3: Fetch Live Details
            await fetchLiveDetails(symbol);

        } catch (err) {
            errDiv.innerText = "Audit Failed: " + err.message;
            errDiv.style.display = 'block';
        } finally {
            loader.style.display = 'none';
        }
    }

    async function fetchCorporateData(symbol) {
        const res = await fetch(`${apiBase}?action=corporate&symbol=${symbol}`);
        const result = await res.json();
        
        let html = `<table>
                        <thead>
                            <tr><th>Date</th><th>Agenda & Outcome</th></tr>
                        </thead>
                        <tbody>`;

        if (result.data && result.data.length > 0) {
            result.data.forEach(meeting => {
                const date = meeting[0];
                const agenda = meeting[1];
                
                // Smart Highlight for Accountants: Detect Dividends, Buybacks, or Results
                const isAction = agenda.toLowerCase().includes("dividend") || 
                                 agenda.toLowerCase().includes("buyback") || 
                                 agenda.toLowerCase().includes("results");
                
                const rowClass = isAction ? 'class="highlight"' : '';

                html += `<tr ${rowClass}>
                            <td style="white-space:nowrap;"><strong>${date}</strong></td>
                            <td>${agenda}</td>
                         </tr>`;
            });
        } else {
            html += `<tr><td colspan="2">No corporate actions found for this symbol.</td></tr>`;
        }

        html += `</tbody></table>`;
        document.getElementById('corporateActions').innerHTML = html;
    }

    async function fetchLiveDetails(symbol) {
        const res = await fetch(`${apiBase}?action=details&symbol=${symbol}`);
        const data = await res.json();
        
        const priceCard = document.getElementById('priceCard');
        priceCard.style.display = 'block';
        document.getElementById('companyName').innerText = data.companyName || symbol;
        
        document.getElementById('priceDetails').innerHTML = `
            <div style="display: flex; gap: 30px; font-size: 1.2em;">
                <div>Price: <strong>₹${data.lastPrice || 'N/A'}</strong></div>
                <div style="color: ${data.pChange >= 0 ? 'green' : 'red'}">
                    Change: ${data.pChange || 0}%
                </div>
            </div>
            <p>52W High: ₹${data.dayHigh || 'N/A'} | 52W Low: ₹${data.dayLow || 'N/A'}</p>
        `;
    }
</script>

</body>
</html>
