<script>
    const API = '/api/market';

    async function doSearch(q, dropId) {
        const drop = document.getElementById(dropId);
        if (q.length < 2) { drop.classList.remove('open'); return; }
        try {
            const res = await fetch(`${API}?action=search&q=${encodeURIComponent(q)}`);
            const data = await res.json();
            if (data.results && data.results.length > 0) {
                drop.innerHTML = data.results.map(s => `
                    <div class="res-item" onclick="selectStock('${s.symbol}')">
                        <b>${s.symbol}</b> <span>${s.name}</span>
                    </div>
                `).join('');
                drop.classList.add('open');
            }
        } catch (e) { console.error("Search failed", e); }
    }

    async function selectStock(sym) {
        document.querySelectorAll('.drop').forEach(d => d.classList.remove('open'));
        go('research');
        const det = document.getElementById('details');
        det.innerHTML = '<div class="card">Loading ' + sym + '...</div>';

        try {
            const res = await fetch(`${API}?action=quote&symbol=${encodeURIComponent(sym)}`);
            const s = await res.json();

            let score = 0;
            if (s.pe > 0 && s.pe < 25) score += 40;
            if (s.changePct > 0) score += 30;
            if (s.price > (s.high52 * 0.8)) score += 30;

            det.innerHTML = `
                <div class="card">
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px">
                        <div><h1>${s.symbol}</h1><small>${s.name}</small></div>
                        <div class="score">${score}</div>
                    </div>
                    <div style="font-size:24px; font-weight:700">₹${s.price.toLocaleString('en-IN')}</div>
                    <div class="${s.changePct >= 0 ? 'green' : 'red'}">${s.changePct.toFixed(2)}%</div>
                    <div style="margin-top:15px; font-size:13px; background:#f0f7ff; padding:10px; border-radius:8px;">
                        <b>Insight:</b> This stock scored ${score}/100 based on your weighted criteria.
                    </div>
                </div>`;
        } catch (e) { det.innerHTML = '<div class="card">Error loading data.</div>'; }
    }

    function go(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    }

    document.getElementById('hSearch').oninput = (e) => doSearch(e.target.value, 'hDrop');
    document.getElementById('rSearch').oninput = (e) => doSearch(e.target.value, 'rDrop');
</script>
