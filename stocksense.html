<script>
    const API_URL = '/api/market';

    function setupSearch(inpId, dropId) {
        const inp = document.getElementById(inpId);
        const drop = document.getElementById(dropId);
        let timer;

        inp.addEventListener('input', () => {
            clearTimeout(timer);
            const q = inp.value.trim();
            if (q.length < 2) return drop.classList.remove('open');

            timer = setTimeout(async () => {
                try {
                    const res = await fetch(`${API_URL}?action=search&q=${encodeURIComponent(q)}`);
                    const data = await res.json();
                    if (data.results) {
                        drop.innerHTML = data.results.map(s => `
                            <div class="sditem" onclick="handleSelect('${s.symbol}', '${inpId}', '${dropId}')">
                                <b>${s.symbol}</b>
                                <span style="font-size:11px;color:var(--muted)">${s.name}</span>
                            </div>
                        `).join('');
                        drop.classList.add('open');
                    }
                } catch (e) { console.error("Search error:", e); }
            }, 400);
        });
    }

    async function handleSelect(sym, inpId, dropId) {
        document.getElementById(dropId).classList.remove('open');
        document.getElementById(inpId).value = sym;
        showPage('research'); // Switch to research tab
        loadStock(sym);
    }

    async function loadStock(sym) {
        const rCard = document.querySelector('.rcard');
        rCard.style.display = 'block';
        rCard.innerHTML = `<div style="padding:40px;text-align:center;">🔍 Analyzing ${sym}...</div>`;

        try {
            const res = await fetch(`${API_URL}?action=quote&symbol=${encodeURIComponent(sym)}`);
            const s = await res.json();

            if (s.error) throw new Error(s.error);

            // Calculation Logic
            let score = 0;
            if (s.pe > 0 && s.pe < 30) score += 40; 
            if (s.changePct > 0) score += 30;
            if (s.price > (s.high52 * 0.75)) score += 30;

            rCard.innerHTML = `
                <div class="rhead">
                    <div>
                        <div class="rsym">${s.symbol}</div>
                        <div class="rname">${s.name}</div>
                    </div>
                    <div class="ring ${score > 60 ? 'rg' : 'ra'}">
                        <div class="rn">${score}</div>
                        <div class="rd">SCORE</div>
                    </div>
                </div>
                <div class="pstrip">
                    <div class="pc"><div class="plbl">PRICE</div><div class="pval">₹${s.price.toLocaleString('en-IN')}</div></div>
                    <div class="pc"><div class="plbl">CHG%</div><div class="pval ${s.changePct >= 0 ? 'up' : 'dn'}">${s.changePct.toFixed(2)}%</div></div>
                    <div class="pc"><div class="plbl">52W HIGH</div><div class="pval">₹${s.high52.toLocaleString('en-IN')}</div></div>
                    <div class="pc"><div class="plbl">P/E RATIO</div><div class="pval">${s.pe ? s.pe.toFixed(1) : 'N/A'}</div></div>
                </div>
                <div class="edu-box">
                    <strong>Smart Insight:</strong> This stock has a score of ${score}/100. 
                    ${score > 70 ? 'Strong fundamentals detected.' : 'Suggested for further peer comparison.'}
                </div>
            `;
        } catch (e) {
            rCard.innerHTML = `<div style="padding:40px;text-align:center;color:red;">⚠️ Data Unavailable for ${sym}. Try another stock.</div>`;
        }
    }

    function showPage(p) {
        document.querySelectorAll('.page').forEach(pg => pg.classList.remove('act'));
        document.getElementById(p + 'Page').classList.add('act');
        const navItems = document.querySelectorAll('.nitem');
        navItems.forEach(ni => ni.classList.remove('on'));
        if(p === 'home') navItems[0].classList.add('on');
        if(p === 'research') navItems[1].classList.add('on');
    }

    document.addEventListener('DOMContentLoaded', () => {
        setupSearch('homeSearch', 'homeDrop');
        setupSearch('resSearch', 'resDrop');
    });
</script>
