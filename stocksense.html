<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StockSense India</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --b: #1a5fa8; --bg: #f7f6f2; --card: #fff; --text: #1a1a18; }
        body { font-family: 'DM Sans', sans-serif; background: var(--bg); margin:0; }
        .nav-top { background: var(--card); padding: 15px; text-align: center; border-bottom: 1px solid #ddd; color: var(--b); font-weight: bold; }
        .container { padding: 20px; max-width: 500px; margin: 0 auto; }
        input { width: 100%; padding: 15px; border-radius: 10px; border: 1px solid #ccc; box-sizing: border-box; }
        .result-card { background: #fff; padding: 20px; border-radius: 15px; margin-top: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); display: none; }
        .drop { background: #fff; border: 1px solid #ddd; border-radius: 10px; margin-top: 5px; max-height: 200px; overflow-y: auto; }
        .drop-item { padding: 10px; border-bottom: 1px solid #eee; cursor: pointer; }
    </style>
</head>
<body>
    <div class="nav-top">STOCKSENSE INDIA</div>
    <div class="container">
        <input type="text" id="srch" placeholder="Search (e.g. Reliance, HDFC)..." oninput="doSearch(this.value)">
        <div id="drop" class="drop"></div>
        <div id="res" class="result-card"></div>
    </div>

    <script>
        async function doSearch(q) {
            const d = document.getElementById('drop');
            if (q.length < 2) { d.innerHTML = ''; return; }
            const res = await fetch(`/api/market?action=search&q=${q}`);
            const data = await res.json();
            d.innerHTML = (data.results || []).map(s => `
                <div class="drop-item" onclick="loadStock('${s.symbol}')">
                    <b>${s.symbol}</b> - ${s.shortname || ''}
                </div>
            `).join('');
        }

        async function loadStock(sym) {
            document.getElementById('drop').innerHTML = '';
            const card = document.getElementById('res');
            card.style.display = 'block';
            card.innerHTML = "Loading data for " + sym + "...";

            try {
                const res = await fetch(`/api/market?action=quote&symbol=${sym}`);
                const s = await res.json();
                card.innerHTML = `
                    <h2 style="margin:0">${s.symbol}</h2>
                    <p style="color:gray">${s.name}</p>
                    <div style="font-size:24px; font-weight:bold; color:#1a5fa8">₹${s.price.toLocaleString('en-IN')}</div>
                    <div style="color:${s.changePct >= 0 ? 'green' : 'red'}">${s.changePct.toFixed(2)}%</div>
                    <hr>
                    <p><b>52W High:</b> ₹${s.high52.toLocaleString('en-IN')}</p>
                    <p><b>P/E Ratio:</b> ${s.pe || 'N/A'}</p>
                `;
            } catch (e) {
                card.innerHTML = "Error fetching data. Please try again.";
            }
        }
    </script>
</body>
</html>
